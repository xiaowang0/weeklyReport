{% extends "base.html" %}

{% block title %}任务管理{% endblock %}

{% block content %}
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: "Microsoft YaHei", sans-serif;
        background: #f5f6fa;
        min-height: 100vh;
    }

    /* 顶部导航栏 */
    .navbar {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
    }
    .nav-list {
        display: flex;
        list-style: none;
        max-width: 1200px;
        margin: 0 auto;
    }
    .nav-item {
        flex: 1;
        text-align: center;
        padding: 12px 6px;
        color: rgba(255,255,255,0.7);
        cursor: pointer;
        transition: all 0.3s;
        border-bottom: 3px solid transparent;
        font-size: 14px;
    }
    .nav-item:hover {
        background: rgba(255,255,255,0.1);
        color: white;
    }
    .nav-item.active {
        color: white;
        border-bottom-color: white;
        background: rgba(255,255,255,0.15);
    }
    .nav-item .nav-icon {
        font-size: 18px;
        display: block;
        margin-bottom: 3px;
    }
    .nav-item .nav-count {
        background: rgba(255,255,255,0.2);
        padding: 1px 8px;
        border-radius: 10px;
        font-size: 12px;
        margin-left: 4px;
    }

    /* 主内容区 */
    .main-content {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 20px;
    }

    /* 页面标题 */
    .page-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 3px solid #e0e0e0;
    }
    .page-icon {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: white;
    }
    .teaching-bg { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
    .competition-bg { background: linear-gradient(135deg, #4ecdc4, #45b7d1); }
    .career-bg { background: linear-gradient(135deg, #45b7d1, #3498db); }
    .research-bg { background: linear-gradient(135deg, #a55eea, #8854d0); }
    .project-bg { background: linear-gradient(135deg, #26de81, #20bf6b); }
    .team-bg { background: linear-gradient(135deg, #ffa502, #fdcb6e); }
    .school-bg { background: linear-gradient(135deg, #dfe6e9, #b2bec3); }

    .page-title {
        font-size: 28px;
        font-weight: bold;
        color: #333;
    }
    .page-date {
        color: #888;
        font-size: 14px;
        margin-top: 3px;
    }

    /* 任务输入区 */
    .task-input-area {
        background: white;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 25px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .task-input-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }
    .task-input-area input[type="text"] {
        flex: 1;
        min-width: 200px;
        padding: 14px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 16px;
        transition: border-color 0.3s;
    }
    .task-input-area input:focus {
        outline: none;
        border-color: #667eea;
    }
    .task-input-area select {
        padding: 14px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 14px;
        background: white;
        cursor: pointer;
        min-width: 120px;
    }
    .task-input-area select:focus {
        outline: none;
        border-color: #667eea;
    }
    .task-input-area input[type="date"] {
        padding: 14px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 14px;
    }
    .task-input-area input[type="date"]:focus {
        outline: none;
        border-color: #667eea;
    }
    .task-input-area button {
        padding: 14px 28px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        font-weight: bold;
    }
    .task-input-area button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    /* 任务卡片 */
    .task-list {
        list-style: none;
    }

    .task-card {
        background: white;
        border-radius: 16px;
        padding: 15px 20px;
        margin-bottom: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        display: flex;
        align-items: center;
        transition: all 0.3s;
        border-left: 4px solid transparent;
    }
    .task-card:hover {
        transform: translateX(5px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .task-card.completed {
        opacity: 0.6;
        border-left-color: #ccc;
    }
    .task-card.completed .task-text-display {
        text-decoration: line-through;
        color: #999;
    }

    /* 分类颜色 */
    .task-card[data-category="教学"] { border-left-color: #ff6b6b; }
    .task-card[data-category="竞赛"] { border-left-color: #4ecdc4; }
    .task-card[data-category="就业"] { border-left-color: #45b7d1; }
    .task-card[data-category="科研"] { border-left-color: #a55eea; }
    .task-card[data-category="项目"] { border-left-color: #26de81; }
    .task-card[data-category="职能组"] { border-left-color: #ffa502; }
    .task-card[data-category="其他"] { border-left-color: #dfe6e9; }

    .task-card .task-text {
        flex: 1;
        font-size: 18px;
        color: #333;
        padding: 5px 8px;
        border-radius: 6px;
        border: 1px solid transparent;
        transition: all 0.2s;
        min-width: 0;
        cursor: pointer;
    }
    .task-card .task-text:hover {
        background: #f5f5f5;
        border-color: #e0e0e0;
    }

    .task-meta {
        font-size: 14px;
        color: #888;
        margin-left: 15px;
        white-space: nowrap;
    }

    .task-checkbox {
        width: 22px;
        height: 22px;
        margin-right: 15px;
        cursor: pointer;
        accent-color: #667eea;
        flex-shrink: 0;
    }

    /* 操作按钮 */
    .task-actions {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-left: 10px;
    }
    .action-btn {
        background: none;
        border: none;
        color: #ccc;
        cursor: pointer;
        font-size: 18px;
        padding: 6px 8px;
        border-radius: 6px;
        transition: all 0.2s;
    }
    .action-btn:hover {
        background: #f0f0f0;
        color: #667eea;
    }
    .action-btn.delete:hover {
        color: #ff4757;
        background: #ffebee;
    }
    .action-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    /* 空状态 */
    .empty-state {
        text-align: center;
        padding: 50px 20px;
        color: #999;
    }
    .empty-state .empty-icon {
        font-size: 48px;
        margin-bottom: 15px;
    }

    /* 弹窗 */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
        background: white;
        padding: 25px;
        border-radius: 16px;
        max-width: 400px;
        width: 90%;
    }
    .modal-content h3 { margin-top: 0; }
    .modal-content textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        resize: vertical;
        min-height: 80px;
        margin: 15px 0;
    }
    .modal-content textarea:focus {
        outline: none;
        border-color: #667eea;
    }
    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn-cancel { background: #e0e0e0; color: #333; }
    .btn-confirm { background: #667eea; color: white; }
    .btn-danger { background: #ff6b6b; color: white; }
    .btn-warning { background: #ffa502; color: white; }
    .btn-success { background: #26de81; color: white; }
</style>

<!-- 顶部导航栏 -->
<nav class="navbar">
    <ul class="nav-list">
        <li class="nav-item active" data-category="all" onclick="switchCategory('all')">
            <span class="nav-icon">📋</span>
            <span class="nav-label">全部</span>
            <span class="nav-count" id="count-all">0</span>
        </li>
        <li class="nav-item" data-category="教学" onclick="switchCategory('教学')">
            <span class="nav-icon">📚</span>
            <span class="nav-label">教学</span>
            <span class="nav-count" id="count-教学">0</span>
        </li>
        <li class="nav-item" data-category="竞赛" onclick="switchCategory('竞赛')">
            <span class="nav-icon">🏆</span>
            <span class="nav-label">竞赛</span>
            <span class="nav-count" id="count-竞赛">0</span>
        </li>
        <li class="nav-item" data-category="就业" onclick="switchCategory('就业')">
            <span class="nav-icon">💼</span>
            <span class="nav-label">就业</span>
            <span class="nav-count" id="count-就业">0</span>
        </li>
        <li class="nav-item" data-category="科研" onclick="switchCategory('科研')">
            <span class="nav-icon">🔬</span>
            <span class="nav-label">科研</span>
            <span class="nav-count" id="count-科研">0</span>
        </li>
        <li class="nav-item" data-category="项目" onclick="switchCategory('项目')">
            <span class="nav-icon">💻</span>
            <span class="nav-label">项目</span>
            <span class="nav-count" id="count-项目">0</span>
        </li>
        <li class="nav-item" data-category="职能组" onclick="switchCategory('职能组')">
            <span class="nav-icon">👥</span>
            <span class="nav-label">职能组</span>
            <span class="nav-count" id="count-职能组">0</span>
        </li>
    </ul>
</nav>

<!-- 主内容区 -->
<main class="main-content">
    <!-- 页面标题 -->
    <div class="page-header">
        <div class="page-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" id="pageIcon">📋</div>
        <div>
            <div class="page-title" id="pageTitle">任务管理</div>
            <div class="page-date" id="pageDate"></div>
        </div>
    </div>

    <!-- 任务输入区 -->
    <div class="task-input-area">
        <div class="task-input-row">
            <input type="text" id="taskName" placeholder="输入任务名称，按回车键添加..." onkeydown="handleKeyDown(event)">
            <select id="taskCategory">
                <option value="教学">📚 教学</option>
                <option value="竞赛">🏆 竞赛</option>
                <option value="就业">💼 就业</option>
                <option value="科研">🔬 科研</option>
                <option value="项目">💻 项目</option>
                <option value="职能组">👥 职能组</option>
                <option value="其他">📝 其他</option>
            </select>
            <select id="taskPriority">
                <option value="高">🔴 高优先级</option>
                <option value="中" selected>🟡 中优先级</option>
                <option value="低">🟢 低优先级</option>
            </select>
        </div>
        <div class="task-input-row" style="margin-top: 12px;">
            <input type="date" id="planStart">
            <span style="color: #888; line-height: 44px;">至</span>
            <input type="date" id="planEnd">
            <button onclick="addTask()">添加任务</button>
        </div>
    </div>

    <!-- 任务列表 -->
    <ul class="task-list" id="taskList"></ul>
</main>

<!-- 暂停原因弹窗 -->
<div class="modal" id="pauseModal">
    <div class="modal-content">
        <h3>填写暂停原因</h3>
        <textarea id="pauseReason" placeholder="请输入暂停原因..."></textarea>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closePauseModal()">取消</button>
            <button class="btn btn-warning" onclick="confirmPause()">确认暂停</button>
        </div>
    </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal" id="deleteModal">
    <div class="modal-content">
        <h3>确认删除</h3>
        <p>确定要删除这个任务吗？此操作不可撤销。</p>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeDeleteModal()">取消</button>
            <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
        </div>
    </div>
</div>

<script>
    const categories = ['教学', '竞赛', '就业', '科研', '项目', '职能组', '其他'];
    const categoryIcons = {
        '教学': '📚', '竞赛': '🏆', '就业': '💼', '科研': '🔬',
        '项目': '💻', '职能组': '👥', '其他': '📝', '全部': '📋'
    };
    const categoryBgClass = {
        '教学': 'teaching-bg', '竞赛': 'competition-bg', '就业': 'career-bg',
        '科研': 'research-bg', '项目': 'project-bg', '职能组': 'team-bg', '其他': 'school-bg'
    };

    let tasks = [];
    let currentCategory = 'all';
    let currentTaskId = null;

    // 初始化日期
    const today = new Date();
    document.getElementById('pageDate').textContent = today.toLocaleDateString('zh-CN', {
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });

    // 计算本周日的函数
    function getThisWeekSunday() {
        const todayCopy = new Date(today);
        const dayOfWeek = todayCopy.getDay();
        const daysUntilSunday = dayOfWeek === 0 ? 0 : 7 - dayOfWeek;
        const sunday = new Date(todayCopy);
        sunday.setDate(todayCopy.getDate() + daysUntilSunday);
        return sunday;
    }

    // 设置默认日期
    function setDefaultDates() {
        document.getElementById('planStart').valueAsDate = today;
        const sunday = getThisWeekSunday();
        document.getElementById('planEnd').valueAsDate = sunday;
    }

    setDefaultDates();

    async function loadTasks() {
        try {
            const response = await fetch('/api/tasks');
            const result = await response.json();
            if (result.success) {
                tasks = result.data || [];
                updateNavCounts();
                renderTasks();
            }
        } catch (error) {
            console.error('获取任务失败:', error);
        }
    }

    function updateNavCounts() {
        document.getElementById('count-all').textContent = tasks.length;
        categories.forEach(cat => {
            const count = tasks.filter(t => t.category === cat).length;
            document.getElementById(`count-${cat}`).textContent = count;
        });
    }

    function switchCategory(category) {
        currentCategory = category;
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.category === category) {
                item.classList.add('active');
            }
        });

        if (category === 'all') {
            document.getElementById('pageTitle').textContent = '任务管理';
            document.getElementById('pageIcon').innerHTML = '📋';
            document.getElementById('taskCategory').value = '教学';
        } else {
            document.getElementById('pageTitle').textContent = categoryIcons[category] + ' ' + category;
            document.getElementById('pageIcon').innerHTML = categoryIcons[category];
            document.getElementById('taskCategory').value = category;
        }

        setDefaultDates();
        renderTasks();
    }

    function renderTasks() {
        const container = document.getElementById('taskList');
        let filteredTasks = currentCategory === 'all'
            ? tasks
            : tasks.filter(t => t.category === currentCategory);

        if (filteredTasks.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <p>暂无任务，添加一个新任务开始吧</p>
                </div>`;
            return;
        }

        let html = '';
        filteredTasks.forEach((task, index) => {
            const completedClass = task.status === '已完成' ? 'completed' : '';

            html += `<li class="task-card ${completedClass}" data-category="${task.category}" data-id="${task.id}">
                <input type="checkbox" class="task-checkbox" ${task.status === '已完成' ? 'checked' : ''}
                    onclick="toggleComplete(${task.id}, this.checked)">
                <a href="/task/${task.id}" style="text-decoration:none;color:inherit;flex:1;display:flex;align-items:center;gap:15px;">
                    <span class="task-text-display" style="flex:1;font-size:18px;color:#333;">${escapeHtml(task.name)}</span>
                </a>
                <span class="task-meta" style="font-size:14px;">${task.plan_start} ~ ${task.plan_end}</span>
                <div class="task-actions">
                    <button class="action-btn" onclick="event.preventDefault();moveTask(${task.id}, ${index}, -1)" title="上移" ${index === 0 ? 'disabled' : ''}>⬆️</button>
                    <button class="action-btn" onclick="event.preventDefault();moveTask(${task.id}, ${index}, 1)" title="下移" ${index === filteredTasks.length - 1 ? 'disabled' : ''}>⬇️</button>
                    ${getStatusButtons(task)}
                    <button class="action-btn delete" onclick="event.preventDefault();openDeleteModal(${task.id})" title="删除">❌</button>
                </div>
            </li>`;
        });

        container.innerHTML = html;
    }

    function getStatusButtons(task) {
        if (task.status === '未开始' || task.status === '暂停') {
            return `<button class="action-btn" onclick="event.preventDefault();setStatus(${task.id}, '进行中')" title="进行中">▶️</button>`;
        }
        if (task.status === '进行中') {
            return `<button class="action-btn" onclick="event.preventDefault();openPauseModal(${task.id})" title="暂停">⏸️</button>`;
        }
        if (task.status === '已完成') {
            return `<button class="action-btn" onclick="event.preventDefault();setStatus(${task.id}, '进行中')" title="重开">🔄</button>`;
        }
        return '';
    }

    async function toggleComplete(taskId, checked) {
        const status = checked ? '已完成' : '进行中';
        await setStatus(taskId, status);
    }

    async function moveTask(taskId, currentIndex, direction) {
        const filteredTasks = currentCategory === 'all'
            ? tasks
            : tasks.filter(t => t.category === currentCategory);

        const newIndex = currentIndex + direction;
        if (newIndex < 0 || newIndex >= filteredTasks.length) return;

        const task1 = filteredTasks[currentIndex];
        const task2 = filteredTasks[newIndex];

        try {
            await fetch(`/api/tasks/${task1.id}/sort`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sort_order: task2.sort_order || newIndex })
            });
            await fetch(`/api/tasks/${task2.id}/sort`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sort_order: currentIndex })
            });
            loadTasks();
        } catch (error) {
            console.error('移动任务失败:', error);
        }
    }

    async function addTask() {
        const name = document.getElementById('taskName').value.trim();
        const category = document.getElementById('taskCategory').value;
        const priority = document.getElementById('taskPriority').value;
        const plan_start = document.getElementById('planStart').value;
        const plan_end = document.getElementById('planEnd').value;

        if (!name || !plan_start || !plan_end) {
            alert('请填写任务名称和计划时间');
            return;
        }

        try {
            const response = await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, category, priority, plan_start, plan_end, status: '未开始' })
            });
            const result = await response.json();
            if (result.success) {
                document.getElementById('taskName').value = '';
                loadTasks();
            }
        } catch (error) {
            console.error('创建任务失败:', error);
        }
    }

    function handleKeyDown(event) {
        if (event.key === 'Enter') {
            addTask();
        }
    }

    async function setStatus(taskId, status) {
        try {
            const response = await fetch(`/api/tasks/${taskId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            const result = await response.json();
            if (result.success) {
                loadTasks();
            }
        } catch (error) {
            console.error('更新状态失败:', error);
        }
    }

    function openPauseModal(taskId) {
        currentTaskId = taskId;
        document.getElementById('pauseReason').value = '';
        document.getElementById('pauseModal').classList.add('active');
    }

    function closePauseModal() {
        document.getElementById('pauseModal').classList.remove('active');
        currentTaskId = null;
    }

    async function confirmPause() {
        const pause_reason = document.getElementById('pauseReason').value;
        if (!pause_reason) {
            alert('请输入暂停原因');
            return;
        }
        try {
            const response = await fetch(`/api/tasks/${currentTaskId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: '暂停', pause_reason })
            });
            const result = await response.json();
            if (result.success) {
                closePauseModal();
                loadTasks();
            }
        } catch (error) {
            console.error('更新状态失败:', error);
        }
    }

    function openDeleteModal(taskId) {
        currentTaskId = taskId;
        document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
        currentTaskId = null;
    }

    async function confirmDelete() {
        try {
            const response = await fetch(`/api/tasks/${currentTaskId}`, { method: 'DELETE' });
            const result = await response.json();
            if (result.success) {
                closeDeleteModal();
                loadTasks();
            }
        } catch (error) {
            console.error('删除任务失败:', error);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    loadTasks();
</script>
