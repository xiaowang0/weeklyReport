{% extends "base.html" %}

{% block title %}任务详情{% endblock %}

{% block content %}
<style>
    .task-detail-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }

    .page-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 3px solid #e0e0e0;
    }
    .page-icon {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5em;
        color: white;
    }
    .page-title {
        font-size: 1.8em;
        font-weight: bold;
        color: #333;
    }

    .detail-card {
        background: white;
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        margin-bottom: 20px;
    }

    .detail-row {
        display: flex;
        padding: 15px 0;
        border-bottom: 1px solid #eee;
    }
    .detail-row:last-child {
        border-bottom: none;
    }
    .detail-label {
        width: 120px;
        font-weight: bold;
        color: #666;
    }
    .detail-value {
        flex: 1;
        color: #333;
    }

    .priority-tag {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85em;
        font-weight: bold;
    }
    .priority-tag.high {
        background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        color: white;
    }
    .priority-tag.medium {
        background: linear-gradient(135deg, #ffa502, #ff7f00);
        color: white;
    }
    .priority-tag.low {
        background: linear-gradient(135deg, #26de81, #20bf6b);
        color: white;
    }

    .status-tag {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85em;
    }
    .status-未开始 { background: #e9ecef; color: #666; }
    .status-进行中 { background: #17a2b8; color: white; }
    .status-已完成 { background: #26de81; color: white; }
    .status-暂停 { background: #ffa502; color: white; }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
    }
    .btn:hover {
        transform: scale(1.05);
    }
    .btn-back {
        background: #e0e0e0;
        color: #333;
        margin-bottom: 20px;
    }
    .btn-success { background: #26de81; color: white; }
    .btn-warning { background: #ffa502; color: white; }
    .btn-danger { background: #ff6b6b; color: white; }
    .btn-primary { background: #667eea; color: white; }

    .action-buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    /* 弹窗 */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
    .modal.active {
        display: flex;
    }
    .modal-content {
        background: white;
        padding: 25px;
        border-radius: 16px;
        max-width: 400px;
        width: 90%;
    }
    .modal-content h3 {
        margin-top: 0;
    }
    .modal-content textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        resize: vertical;
        min-height: 80px;
        margin: 15px 0;
    }
    .modal-content textarea:focus {
        outline: none;
        border-color: #667eea;
    }
    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .loading {
        text-align: center;
        padding: 50px;
        color: #999;
    }
</style>

<div class="task-detail-container">
    <button class="btn btn-back" onclick="goBack()">← 返回</button>

    <div id="taskDetail">
        <div class="loading">加载中...</div>
    </div>
</div>

<!-- 状态更新弹窗 -->
<div class="modal" id="statusModal">
    <div class="modal-content">
        <h3 id="statusModalTitle">更新状态</h3>
        <div id="statusModalContent">
            <select id="newStatus" style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:12px;font-size:14px;">
                <option value="未开始">未开始</option>
                <option value="进行中">进行中</option>
                <option value="已完成">已完成</option>
                <option value="暂停">暂停</option>
            </select>
        </div>
        <div id="pauseReasonArea" style="display:none;margin-top:15px;">
            <textarea id="pauseReason" placeholder="请输入暂停原因..." style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:12px;resize:vertical;min-height:80px;"></textarea>
        </div>
        <div id="progressNoteArea" style="display:none;margin-top:15px;">
            <textarea id="progressNote" placeholder="请输入进度备注..." style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:12px;resize:vertical;min-height:80px;"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn" style="background:#e0e0e0;color:#333;" onclick="closeStatusModal()">取消</button>
            <button class="btn btn-primary" onclick="confirmStatusUpdate()">确认</button>
        </div>
    </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal" id="deleteModal">
    <div class="modal-content">
        <h3>确认删除</h3>
        <p>确定要删除这个任务吗？此操作不可撤销。</p>
        <div class="modal-actions">
            <button class="btn" style="background:#e0e0e0;color:#333;" onclick="closeDeleteModal()">取消</button>
            <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
        </div>
    </div>
</div>

<script>
    const taskId = {{ task_id }};
    let currentTask = null;

    function goBack() {
        history.back();
    }

    async function loadTask() {
        try {
            const response = await fetch(`/api/tasks/${taskId}`);
            if (!response.ok) {
                document.getElementById('taskDetail').innerHTML = '<div class="loading">任务不存在</div>';
                return;
            }
            const result = await response.json();
            if (result.success && result.data) {
                currentTask = result.data;
                renderTaskDetail();
            } else {
                document.getElementById('taskDetail').innerHTML = '<div class="loading">任务不存在</div>';
            }
        } catch (error) {
            console.error('获取任务失败:', error);
            document.getElementById('taskDetail').innerHTML = '<div class="loading">加载失败</div>';
        }
    }

    function renderTaskDetail() {
        const t = currentTask;
        const createdAt = t.created_at ? new Date(t.created_at).toLocaleString('zh-CN') : '-';
        const updatedAt = t.updated_at ? new Date(t.updated_at).toLocaleString('zh-CN') : '-';

        let html = `
            <div class="detail-card">
                <div class="detail-row">
                    <div class="detail-label">任务名称</div>
                    <div class="detail-value" style="font-size:1.2em;font-weight:bold;">${escapeHtml(t.name)}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">所属分类</div>
                    <div class="detail-value">${t.category}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">优先级</div>
                    <div class="detail-value"><span class="priority-tag ${t.priority}">${t.priority}</span></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">状态</div>
                    <div class="detail-value"><span class="status-tag status-${t.status}">${t.status}</span></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">计划时间</div>
                    <div class="detail-value">${t.plan_start} ~ ${t.plan_end}</div>
                </div>
                ${t.progress_note ? `
                <div class="detail-row">
                    <div class="detail-label">进度备注</div>
                    <div class="detail-value">${escapeHtml(t.progress_note)}</div>
                </div>` : ''}
                ${t.pause_reason ? `
                <div class="detail-row">
                    <div class="detail-label">暂停原因</div>
                    <div class="detail-value" style="color:#ff6b6b;">${escapeHtml(t.pause_reason)}</div>
                </div>` : ''}
                <div class="detail-row">
                    <div class="detail-label">创建时间</div>
                    <div class="detail-value">${createdAt}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">更新时间</div>
                    <div class="detail-value">${updatedAt}</div>
                </div>
            </div>

            <div class="action-buttons">
                ${getActionButtons(t)}
            </div>
        `;

        document.getElementById('taskDetail').innerHTML = html;
    }

    function getActionButtons(task) {
        let buttons = '';
        if (task.status === '未开始' || task.status === '暂停') {
            buttons += `<button class="btn btn-success" onclick="openStatusModal('进行中')">进行中</button>`;
        }
        if (task.status === '进行中') {
            buttons += `<button class="btn btn-success" onclick="openStatusModal('已完成')">已完成</button>`;
            buttons += `<button class="btn btn-warning" onclick="openStatusModal('暂停')">暂停</button>`;
        }
        if (task.status === '已完成') {
            buttons += `<button class="btn btn-primary" onclick="openStatusModal('进行中')">重开</button>`;
        }
        buttons += `<button class="btn btn-danger" onclick="openDeleteModal()">删除</button>`;
        return buttons;
    }

    let pendingStatus = null;

    function openStatusModal(status) {
        pendingStatus = status;
        document.getElementById('newStatus').value = status;
        document.getElementById('pauseReasonArea').style.display = status === '暂停' ? 'block' : 'none';
        document.getElementById('progressNoteArea').style.display = status === '已完成' ? 'block' : 'none';
        document.getElementById('statusModal').classList.add('active');
    }

    function closeStatusModal() {
        document.getElementById('statusModal').classList.remove('active');
        pendingStatus = null;
    }

    async function confirmStatusUpdate() {
        if (!pendingStatus) return;

        const status = document.getElementById('newStatus').value;
        const pauseReason = document.getElementById('pauseReason').value;
        const progressNote = document.getElementById('progressNote').value;

        try {
            const response = await fetch(`/api/tasks/${taskId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    status: status,
                    pause_reason: pauseReason,
                    progress_note: progressNote
                })
            });
            const result = await response.json();
            if (result.success) {
                closeStatusModal();
                loadTask();
            }
        } catch (error) {
            console.error('更新状态失败:', error);
        }
    }

    function openDeleteModal() {
        document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
    }

    async function confirmDelete() {
        try {
            const response = await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
            const result = await response.json();
            if (result.success) {
                window.location.href = '/tasks';
            }
        } catch (error) {
            console.error('删除任务失败:', error);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    loadTask();
</script>
{% endblock %}
