{% extends "base.html" %}

{% block title %}每日任务{% endblock %}

{% block content %}
<style>
    .daily-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }
    .filter-bar {
        background: #f5f5f5;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: center;
    }
    .filter-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .filter-group label {
        font-weight: bold;
    }
    .filter-group input, .filter-group select {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }
    .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
    }
    .btn-primary {
        background: #007bff;
        color: white;
    }
    .btn-primary:hover {
        background: #0056b3;
    }
    .category-section {
        margin-bottom: 20px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
    }
    .category-header {
        background: #e9ecef;
        padding: 12px 20px;
        font-weight: bold;
        font-size: 16px;
    }
    .task-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .task-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        border-bottom: 1px solid #eee;
    }
    .task-item:last-child {
        border-bottom: none;
    }
    .task-info {
        flex: 1;
    }
    .task-name {
        font-weight: bold;
        margin-bottom: 4px;
    }
    .task-meta {
        font-size: 12px;
        color: #666;
    }
    .task-meta span {
        margin-right: 15px;
    }
    .priority-high { color: #dc3545; }
    .priority-medium { color: #ffc107; }
    .priority-low { color: #28a745; }
    .status-tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 12px;
    }
    .status-未开始 { background: #e9ecef; }
    .status-进行中 { background: #17a2b8; color: white; }
    .status-已完成 { background: #28a745; color: white; }
    .status-已暂停 { background: #ffc107; color: #212529; }
    .empty-state {
        text-align: center;
        padding: 40px;
        color: #999;
    }
    .date-input {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }
</style>

<div class="daily-container">
    <div class="filter-bar">
        <div class="filter-group">
            <label for="datePicker">选择日期:</label>
            <input type="date" id="datePicker" class="date-input">
        </div>
        <div class="filter-group">
            <label for="statusFilter">状态筛选:</label>
            <select id="statusFilter">
                <option value="全部">全部</option>
                <option value="未开始">未开始</option>
                <option value="进行中">进行中</option>
                <option value="已完成">已完成</option>
                <option value="已暂停">已暂停</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="loadTasks()">查询</button>
    </div>

    <div id="taskList"></div>
</div>

<script>
    let allTasks = [];

    // 页面加载时自动获取当天任务
    document.addEventListener('DOMContentLoaded', function() {
        // 设置默认日期为今天
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').value = today;
        loadTasks();
    });

    // 加载指定日期的任务
    async function loadTasks() {
        const date = document.getElementById('datePicker').value;
        if (!date) {
            alert('请选择日期');
            return;
        }

        try {
            const response = await fetch(`/api/daily?date=${date}`);
            const result = await response.json();
            if (result.success) {
                allTasks = result.data || [];
                renderTasks();
            }
        } catch (error) {
            console.error('获取任务失败:', error);
        }
    }

    // 根据状态筛选渲染任务
    function renderTasks() {
        const statusFilter = document.getElementById('statusFilter').value;
        const filteredTasks = statusFilter === '全部'
            ? allTasks
            : allTasks.filter(t => t.status === statusFilter);

        const categories = ['教学', '竞赛', '就业', '科研', '项目', '职能组', '院校支撑'];
        const container = document.getElementById('taskList');

        if (filteredTasks.length === 0) {
            container.innerHTML = '<div class="empty-state">该日期没有任务</div>';
            return;
        }

        let html = '';
        categories.forEach(category => {
            const categoryTasks = filteredTasks.filter(t => t.category === category);
            if (categoryTasks.length === 0) return;

            html += `<div class="category-section">
                <div class="category-header">${category}</div>
                <ul class="task-list">`;

            categoryTasks.forEach(task => {
                const priorityClass = `priority-${task.priority}`;
                html += `<li class="task-item">
                    <div class="task-info">
                        <div class="task-name">${escapeHtml(task.name)}</div>
                        <div class="task-meta">
                            <span>优先级: <span class="${priorityClass}">${task.priority}</span></span>
                            <span>状态: <span class="status-tag status-${task.status}">${task.status}</span></span>
                            <span>计划: ${task.plan_start} ~ ${task.plan_end}</span>
                        </div>
                    </div>
                </li>`;
            });

            html += `</ul></div>`;
        });

        if (!html) {
            html = '<div class="empty-state">该日期没有任务</div>';
        }

        container.innerHTML = html;
    }

    // 状态筛选变化时重新渲染
    document.getElementById('statusFilter').addEventListener('change', renderTasks);

    // HTML转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
{% endblock %}
