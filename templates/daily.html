<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日任务</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f5f6fa; min-height: 100vh; }

        .daily-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .filter-bar {
            background: #f5f5f5; padding: 20px; border-radius: 8px;
            margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
        }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group label { font-weight: bold; }
        input, select {
            padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;
        }
        .btn {
            padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }

        .category-section {
            margin-bottom: 20px; background: white;
            border: 1px solid #ddd; border-radius: 8px; overflow: hidden;
        }
        .category-header {
            background: #e9ecef; padding: 12px 20px; font-weight: bold; font-size: 16px;
        }
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; border-bottom: 1px solid #eee;
        }
        .task-item:last-child { border-bottom: none; }
        .task-info { flex: 1; }
        .task-name { font-weight: bold; margin-bottom: 4px; }
        .task-meta { font-size: 12px; color: #666; }
        .task-meta span { margin-right: 15px; }

        .status-tag {
            display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px;
        }
        .status-未开始 { background: #e9ecef; }
        .status-进行中 { background: #17a2b8; color: white; }
        .status-已完成 { background: #28a745; color: white; }
        .status-暂停 { background: #ffc107; color: #212529; }

        .empty-state { text-align: center; padding: 40px; color: #999; }

        .nav-links { display: flex; gap: 20px; margin-bottom: 20px; padding: 0 20px; }
        .nav-links a { color: #667eea; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="app">
        <div class="daily-container">
            <div class="nav-links">
                <a href="/">任务管理</a>
                <a href="/report">周报导出</a>
            </div>

            <div class="filter-bar">
                <div class="filter-group">
                    <input type="week" v-model="selectedWeek">
                </div>
                <div class="filter-group">
                    <label>状态筛选:</label>
                    <select v-model="statusFilter">
                        <option value="全部">全部</option>
                        <option value="未开始">未开始</option>
                        <option value="进行中">进行中</option>
                        <option value="已完成">已完成</option>
                        <option value="暂停">暂停</option>
                    </select>
                </div>
                <button class="btn btn-primary" @click="loadTasks">查询</button>
            </div>

            <div v-for="cat in categoriesWithTasks" :key="cat.name" class="category-section">
                <div class="category-header">[[ cat.name ]]</div>
                <ul class="task-list">
                    <li v-for="task in cat.tasks" :key="task.id" class="task-item">
                        <div class="task-info">
                            <div class="task-name">[[ task.name ]]</div>
                            <div class="task-meta">
                                <span>优先级: [[ task.priority ]]</span>
                                <span>状态: <span class="status-tag" :class="'status-' + task.status">[[ task.status ]]</span></span>
                                <span>计划: [[ task.plan_start ]] ~ [[ task.plan_end ]]</span>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>

            <div v-if="categoriesWithTasks.length === 0" class="empty-state">
                该周没有任务
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            delimiters: ['[[', ']]'],
            setup() {
                const tasks = ref([]);
                const selectedWeek = ref('');
                const statusFilter = ref('全部');
                const categories = ['教学', '竞赛', '就业', '科研', '项目', '职能组', '院校支撑'];

                // 获取本地日期字符串 (YYYY-MM-DD)
                const toLocalDateStr = (date) => {
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, '0');
                    const d = String(date.getDate()).padStart(2, '0');
                    return `${y}-${m}-${d}`;
                };

                // 教学周：第1周从2026-03-02开始
                const TERM_START = new Date(2026, 2, 2); // 2026-03-02 (周一)

                // 从 YYYY-Www 格式获取该周的周一和教学周数
                const getWeekInfo = (yearWeek) => {
                    if (!yearWeek) return { start: '', end: '', weekNum: 0 };
                    const [year, isoWeek] = yearWeek.split('-W').map(Number);
                    const jan4 = new Date(year, 0, 4);
                    const jan4Day = jan4.getDay();
                    const daysToMon = jan4Day === 0 ? -6 : 1 - jan4Day;
                    const week1Monday = new Date(jan4);
                    week1Monday.setDate(jan4.getDate() + daysToMon);
                    const monday = new Date(week1Monday);
                    monday.setDate(week1Monday.getDate() + (isoWeek - 1) * 7);
                    const sunday = new Date(monday);
                    sunday.setDate(monday.getDate() + 6);
                    const daysSinceTermStart = Math.floor((monday - TERM_START) / (24 * 60 * 60 * 1000));
                    const teachingWeek = Math.floor(daysSinceTermStart / 7) + 1;
                    return {
                        start: toLocalDateStr(monday),
                        end: toLocalDateStr(sunday),
                        weekNum: teachingWeek
                    };
                };

                const categoriesWithTasks = computed(() => {
                    return categories
                        .map(cat => ({
                            name: cat,
                            tasks: tasks.value.filter(t => {
                                const matchCat = t.category === cat;
                                const matchStatus = statusFilter.value === '全部' || t.status === statusFilter.value;
                                return matchCat && matchStatus;
                            })
                        }))
                        .filter(cat => cat.tasks.length > 0);
                });

                const loadTasks = async () => {
                    if (!selectedWeek.value) {
                        alert('请选择周');
                        return;
                    }

                    const { start, end } = getWeekInfo(selectedWeek.value);

                    try {
                        const res = await fetch('/api/tasks');
                        const result = await res.json();
                        if (result.success) {
                            // 过滤与该周有交集的任务（plan_start <= end AND plan_end >= start）
                            tasks.value = result.data.filter(t => t.plan_start <= end && t.plan_end >= start);
                        }
                    } catch (error) {
                        console.error('获取任务失败:', error);
                    }
                };

                onMounted(() => {
                    // 获取当前日期对应的 ISO 周
                    const now = new Date();
                    const year = now.getFullYear();
                    const jan4 = new Date(year, 0, 4);
                    const jan4Day = jan4.getDay();
                    const daysToMon = jan4Day === 0 ? -6 : 1 - jan4Day;
                    const week1Monday = new Date(jan4);
                    week1Monday.setDate(jan4.getDate() + daysToMon);
                    const daysSinceMonday = Math.floor((now - week1Monday) / (24 * 60 * 60 * 1000));
                    const isoWeek = Math.floor(daysSinceMonday / 7) + 1;
                    selectedWeek.value = `${year}-W${String(isoWeek).padStart(2, '0')}`;
                    loadTasks();
                });

                return {
                    tasks,
                    selectedWeek,
                    statusFilter,
                    categoriesWithTasks,
                    loadTasks
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
